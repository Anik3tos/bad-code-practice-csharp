services:
  challenge-db:
    image: postgres:17-alpine
    container_name: bad-code-practice-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bad_code_practice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - bad_code_practice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bad_code_practice"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  bad_code_practice_pgdata:
